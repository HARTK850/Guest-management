name: Build Electron - Windows Setup.exe

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'

  workflow_dispatch:


permissions:
  contents: write


jobs:

  build-windows:

    name: Build Windows Application

    runs-on: windows-latest


    steps:


      # ==========================================
      # 1. Clone repository
      # ==========================================
      - name: Checkout repository
        uses: actions/checkout@v4



      # ==========================================
      # 2. Setup Python
      # ==========================================
      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'



      # ==========================================
      # 3. Install Python packages
      # ==========================================
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install SpeechRecognition
          pip install pyinstaller
          pip install pyaudio



      # ==========================================
      # 4. Build transcribe.exe
      # ==========================================
      - name: Build transcribe.exe from Python
        working-directory: electron
        run: |
          pyinstaller --onefile --name transcribe transcribe.py



      # ==========================================
      # 5. Verify transcribe.exe
      # ==========================================
      - name: Verify transcribe.exe exists
        working-directory: electron
        shell: pwsh
        run: |
          if (!(Test-Path "dist/transcribe.exe")) {
            Write-Error "transcribe.exe was not created"
            exit 1
          }

          Write-Host "transcribe.exe created successfully"



      # ==========================================
      # 6. Copy transcribe.exe
      # ==========================================
      - name: Copy transcribe.exe into Electron folder
        working-directory: electron
        shell: pwsh
        run: |
          Copy-Item "dist/transcribe.exe" "transcribe.exe" -Force



      # ==========================================
      # 7. Setup Node.js
      # ==========================================
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: electron/package.json



      # ==========================================
      # 8. Install Electron dependencies
      # ==========================================
      - name: Install Electron dependencies
        working-directory: electron
        run: |
          npm install



      # ==========================================
      # 9. Verify Electron files
      # ==========================================
      - name: Verify Electron build files
        working-directory: electron
        shell: pwsh
        run: |

          if (!(Test-Path "transcribe.exe")) {
            Write-Error "Missing electron/transcribe.exe"
            exit 1
          }

          Write-Host "Electron files ready"



      # ==========================================
      # 10. Build Windows installer
      # ==========================================
      - name: Build Windows installer (Setup.exe)
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        run: |
          npm run dist -- --publish never



      # ==========================================
      # 11. List build output
      # ==========================================
      - name: List build output
        shell: pwsh
        run: |
          Get-ChildItem -Recurse dist/



      # ==========================================
      # 12. Upload installer
      # ==========================================
      - name: Upload Setup.exe artifact
        uses: actions/upload-artifact@v4

        with:
          name: ShabbatHostingManager-Setup
          path: dist/*.exe
          retention-days: 30
          if-no-files-found: error



      # ==========================================
      # 13. Create GitHub Release
      # ==========================================
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')

        uses: softprops/action-gh-release@v2

        with:

          files: dist/*.exe

          name: "ניהול אירוח לשבת ${{ github.ref_name }}"

          body: |
            ## גרסה ${{ github.ref_name }}

            ### הורדה
            הורד את Setup.exe והפעל להתקנה.

            ### דרישות
            - Windows 10 / 11 (64-bit)
            - מיקרופון לשימוש בעוזר הקולי


        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
